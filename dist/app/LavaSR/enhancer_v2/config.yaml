backbone:
  class_path: vocos.models.VocosBackbone
  init_args:
    dim: 512
    input_channels: 80
    intermediate_dim: 1536
    num_layers: 8
feature_extractor:
  class_path: vocos.feature_extractors.MelSpectrogramFeatures
  init_args:
    f_max: 8000
    f_min: 0
    hop_length: 512
    n_fft: 2048
    n_mels: 80
    padding: same
    sample_rate: 44100
head:
  class_path: vocos.heads.ISTFTHead
  init_args:
    dim: 512
    hop_length: 512
    n_fft: 2048
    padding: same
